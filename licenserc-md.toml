## hawkeye license-header enforcement for Markdown files.
## Run locally: hawkeye check --config licenserc-md.toml
## Docs: https://github.com/korandoru/hawkeye
##
## Markdown is in hawkeye's built-in default excludes and has no built-in header
## type mapping, so it needs its own config. The negation rule `!**/*.md` in
## excludes overrides the default exclusion for .md files. The custom
## MARKDOWN_STYLE maps .md to an HTML-comment block that matches our existing
## <!-- ... --> header format (no extra blank lines after <!-- or before -->).

inlineHeader = """
Copyright © Advanced Micro Devices, Inc., or its affiliates.

SPDX-License-Identifier: MIT
"""

additionalHeaders = ["licenserc-md-header.toml"]

includes = [
  "**/*.md",
]

excludes = [
  "!**/*.md",
  "target/**",
  ".claude/**",
  ".tmp-*/**",
"third_party/**",
]

[mapping.MARKDOWN_STYLE]
extensions = ["md"]
