# Git hooks for rocm-cli, managed with prek (https://github.com/j178/prek),
# a fast, drop-in replacement for pre-commit.
#
# Setup:
#   uv tool install prek        # or: cargo install --locked prek
#   prek install                # install the pre-commit hook
#   prek install -t pre-push    # install the pre-push hook (clippy + tests)
#
# Run against everything on demand:
#   prek run --all-files
#
# NOTE: the `repo: builtin` block uses prek's native Rust hooks and is therefore
# NOT compatible with the classic `pre-commit` tool. Everything else is standard.
#
# CI runs `prek run --all-files --no-group local-tools` so this file is the single
# source of truth for the lint/format/hygiene checks. Hooks tagged
# `groups: [local-tools]` need a full Rust compile, hawkeye, PowerShell, or
# commit-history/signing access and are covered by their own dedicated CI jobs
# (clippy / build-and-test / license-headers / powershell-lint /
# commit-signatures), so the prek job skips them.

default_install_hook_types: [pre-commit, pre-push]

# Vendored sources are checked into third_party/ and must not be reformatted or
# linted by our hooks.
exclude: '^third_party/'

repos:
  # Fast, zero-setup hygiene hooks implemented natively by prek (no clone, no venv).
  - repo: builtin
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf] # repo standardises on LF endings (see .gitattributes)

  # Python: lint + format the helper scripts and engine workers.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # Shell scripts (install.sh, scripts/*.sh). `--enable=all` turns on every
  # optional check; SC2310/SC2312 (set -e suppression in conditionals) are
  # excluded as they require risky restructuring of these setup scripts.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        # Quote the excludes: an unquoted `--exclude=SC2310,SC2312` in a YAML
        # flow sequence splits on the comma, dropping SC2312 from the exclude
        # list and passing it to shellcheck as a (nonexistent) filename.
        args: [--enable=all, "--exclude=SC2310,SC2312"]

  # Commit trust: signing + DCO sign-off are enforced, not just policy.
  # `--check-config` is a fast local-config assertion run on every commit;
  # the full range verification is deferred to pre-push (and mirrored in CI).
  - repo: local
    hooks:
      - id: commit-signing-configured
        name: commit signing configured
        entry: cargo xtask verify-commits --check-config
        language: system
        pass_filenames: false
        stages: [pre-commit]
        groups: [local-tools] # local-only; CI uses the `commit-signatures` job
      - id: verify-commits
        name: verify commits are signed and signed-off
        entry: cargo xtask verify-commits
        language: system
        pass_filenames: false
        stages: [pre-push]
        groups: [local-tools] # local-only; CI uses the `commit-signatures` job

  # License headers: mirrors the korandoru/hawkeye CI check.
  # Requires: cargo install hawkeye
  - repo: local
    hooks:
      - id: license-headers
        name: license header check (hawkeye)
        entry: hawkeye check --config licenserc.toml
        language: system
        types_or: [rust, python, shell]
        pass_filenames: false
        groups: [local-tools] # runs in the dedicated `license-headers` CI job (hawkeye action)

  # Rust + PowerShell: mirror the CI checks using the local toolchain.
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        # Only needs rustfmt (no compile), so it runs in the prek job. clippy and
        # the test build below need a full compile and stay `local-tools`.
        entry: cargo fmt --all --check
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push] # compiles the workspace; too slow for every commit
        groups: [local-tools] # runs in the dedicated `clippy` CI job
      - id: cargo-test
        name: cargo test
        entry: cargo test --workspace --all-targets
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]
        groups: [local-tools] # runs in the dedicated build-and-test CI job
      - id: powershell-script-analyzer
        name: PSScriptAnalyzer
        # Lints every .ps1 with PSScriptAnalyzer, which also covers syntax (a file
        # that fails to parse is reported as a ParseError). The xtask auto-detects
        # PowerShell 7+ (pwsh) or pre-installed Windows PowerShell (powershell) and
        # skips cleanly on non-Windows hosts (CI lints on Windows), or if neither
        # it nor the PSScriptAnalyzer module is present.
        # On CI the dedicated `powershell-lint` job runs this under both editions.
        entry: cargo xtask powershell-lint
        language: system
        files: \.ps1$
        groups: [local-tools] # runs in the dedicated `powershell-lint` CI job
