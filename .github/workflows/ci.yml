name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: target

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install native build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libcap-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Local no-fallback smoke
        run: python scripts/smoke_local.py --skip-build

      - name: Acceptance harness self-tests
        run: |
          python scripts/pytorch_therock_gpu_test.py --self-test
          python scripts/llama_cpp_therock_gpu_test.py --self-test
          python scripts/comfyui_therock_gpu_test.py --self-test
          python scripts/local_assistant_therock_gpu_test.py --self-test
          python scripts/vllm_therock_gpu_test.py --self-test
          python scripts/sglang_therock_gpu_test.py --self-test
          python scripts/atom_therock_gpu_test.py --self-test
          python scripts/wsl_preflight.py --self-test

      - name: Portable WSL build deps self-test
        run: bash scripts/setup-wsl-portable-build-deps.sh --self-test

      - name: Release readiness self-test
        run: python scripts/release_readiness.py --self-test

      - name: Acceptance install lifecycle
        if: github.event_name == 'push'
        run: ./scripts/acceptance-install-upgrade-tui-uninstall.sh

  windows-build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Test
        shell: pwsh
        run: cargo test --workspace --all-targets

      - name: Local no-fallback smoke
        shell: pwsh
        run: python .\scripts\smoke_local.py --skip-build

      - name: Acceptance harness self-tests
        shell: pwsh
        run: |
          python .\scripts\pytorch_therock_gpu_test.py --self-test
          python .\scripts\llama_cpp_therock_gpu_test.py --self-test
          python .\scripts\comfyui_therock_gpu_test.py --self-test
          python .\scripts\local_assistant_therock_gpu_test.py --self-test
          python .\scripts\vllm_therock_gpu_test.py --self-test
          python .\scripts\sglang_therock_gpu_test.py --self-test
          python .\scripts\atom_therock_gpu_test.py --self-test
          python .\scripts\wsl_preflight.py --self-test

      - name: Release readiness self-test
        shell: pwsh
        run: python .\scripts\release_readiness.py --self-test

      - name: Check PowerShell installer syntax
        shell: pwsh
        run: |
          $null = [scriptblock]::Create((Get-Content .\install.ps1 -Raw))
          $null = [scriptblock]::Create((Get-Content .\scripts\package-windows-release.ps1 -Raw))

      - name: Acceptance install lifecycle
        shell: pwsh
        run: .\scripts\acceptance-install-upgrade-tui-uninstall.ps1

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  gpu-smoke:
    name: GPU Smoke (MI300X)
    runs-on: [self-hosted, mi300x]
    needs: [build-and-test, fmt, clippy]
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Build workspace
        run: cargo build --workspace --all-targets

      - name: Host detection
        run: ./target/debug/rocm doctor

      - name: Engine detection
        run: ./target/debug/rocm-engine-pytorch detect

      - name: Engine capabilities
        run: ./target/debug/rocm-engine-pytorch capabilities

      - name: llama.cpp adapter detection
        run: ./target/debug/rocm-engine-llama-cpp detect

      - name: llama.cpp adapter capabilities
        run: ./target/debug/rocm-engine-llama-cpp capabilities

      - name: ATOM adapter detection
        run: ./target/debug/rocm-engine-atom detect

      - name: ATOM adapter capabilities
        run: ./target/debug/rocm-engine-atom capabilities

      - name: vLLM adapter detection
        run: ./target/debug/rocm-engine-vllm detect

      - name: vLLM adapter capabilities
        run: ./target/debug/rocm-engine-vllm capabilities

      - name: SGLang adapter detection
        run: ./target/debug/rocm-engine-sglang detect

      - name: SGLang adapter capabilities
        run: ./target/debug/rocm-engine-sglang capabilities

      - name: Resolve large-model recipe
        run: ./target/debug/rocm-engine-pytorch resolve-model qwen32b
