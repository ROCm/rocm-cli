name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install native build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libcap-dev

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Local no-fallback smoke
        run: python scripts/smoke_local.py --skip-build

      - name: Acceptance harness self-tests
        run: |
          python scripts/pytorch_therock_gpu_test.py --self-test
          python scripts/llama_cpp_therock_gpu_test.py --self-test
          python scripts/comfyui_therock_gpu_test.py --self-test
          python scripts/local_assistant_therock_gpu_test.py --self-test
          python scripts/vllm_therock_gpu_test.py --self-test
          python scripts/sglang_therock_gpu_test.py --self-test
          python scripts/atom_therock_gpu_test.py --self-test
          python scripts/wsl_preflight.py --self-test

      - name: Portable WSL build deps self-test
        run: bash scripts/setup-wsl-portable-build-deps.sh --self-test

      - name: Release readiness self-test
        run: python scripts/release_readiness.py --self-test

      - name: Acceptance install lifecycle
        run: ./scripts/acceptance-install-upgrade-tui-uninstall.sh

  windows-build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build
        shell: pwsh
        run: cargo build --workspace --all-targets

      - name: Test
        shell: pwsh
        run: cargo test --workspace --all-targets

      - name: Local no-fallback smoke
        shell: pwsh
        run: python .\scripts\smoke_local.py --skip-build

      - name: Acceptance harness self-tests
        shell: pwsh
        run: |
          python .\scripts\pytorch_therock_gpu_test.py --self-test
          python .\scripts\llama_cpp_therock_gpu_test.py --self-test
          python .\scripts\comfyui_therock_gpu_test.py --self-test
          python .\scripts\local_assistant_therock_gpu_test.py --self-test
          python .\scripts\vllm_therock_gpu_test.py --self-test
          python .\scripts\sglang_therock_gpu_test.py --self-test
          python .\scripts\atom_therock_gpu_test.py --self-test
          python .\scripts\wsl_preflight.py --self-test

      - name: Release readiness self-test
        shell: pwsh
        run: python .\scripts\release_readiness.py --self-test

      - name: Check PowerShell installer syntax
        shell: pwsh
        run: |
          $null = [scriptblock]::Create((Get-Content .\install.ps1 -Raw))
          $null = [scriptblock]::Create((Get-Content .\scripts\package-windows-release.ps1 -Raw))

      - name: Acceptance install lifecycle
        shell: pwsh
        run: .\scripts\acceptance-install-upgrade-tui-uninstall.ps1

  win11-build-and-test:
    name: Pure Windows 11 build and test
    runs-on: [self-hosted, windows-gfx1151-gpu-rocm]
    # Self-hosted runners must not execute untrusted fork PRs.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-win11-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-win11-

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace --all-targets

  wsl-ubuntu-build-and-test:
    name: Ubuntu on WSL build and test (primary)
    runs-on: [self-hosted, wsl, ubuntu]
    # Self-hosted runners must not execute untrusted fork PRs.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Build and test in WSL Ubuntu
        run: |
          $ErrorActionPreference = "Stop"
          $wp = (wsl -d Ubuntu wslpath "'$($PWD.Path)'").Trim()
          $script = @"
          set -euo pipefail
          cd '$wp'
          export CARGO_TARGET_DIR="`$HOME/.cache/rocm-cli-target"
          if ! command -v cargo >/dev/null 2>&1; then
            curl -fsSL https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
            export PATH="`$HOME/.cargo/bin:`$PATH"
          fi
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y pkg-config libcap-dev build-essential
          fi
          cargo build --workspace --all-targets
          cargo test --workspace --all-targets
          "@
          wsl -d Ubuntu -- bash -lc $script
          if ($LASTEXITCODE -ne 0) { throw "WSL Ubuntu build/test failed with exit code $LASTEXITCODE" }

  wsl-fedora-build-and-test:
    name: Fedora on WSL build and test (secondary)
    runs-on: [self-hosted, wsl, fedora]
    # Secondary target: failures must not block the PR.
    continue-on-error: true
    # Self-hosted runners must not execute untrusted fork PRs.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Build and test in WSL Fedora
        run: |
          $ErrorActionPreference = "Stop"
          $wp = (wsl -d Fedora wslpath "'$($PWD.Path)'").Trim()
          $script = @"
          set -euo pipefail
          cd '$wp'
          export CARGO_TARGET_DIR="`$HOME/.cache/rocm-cli-target"
          if ! command -v cargo >/dev/null 2>&1; then
            curl -fsSL https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
            export PATH="`$HOME/.cargo/bin:`$PATH"
          fi
          if command -v dnf >/dev/null 2>&1; then
            sudo dnf install -y pkgconf-pkg-config libcap-devel gcc gcc-c++ make
          fi
          cargo build --workspace --all-targets
          cargo test --workspace --all-targets
          "@
          wsl -d Fedora -- bash -lc $script
          if ($LASTEXITCODE -ne 0) { throw "WSL Fedora build/test failed with exit code $LASTEXITCODE" }

  instinct-linux-build-and-test:
    name: Ubuntu Instinct bare-metal build and test
    runs-on: [self-hosted, linux, instinct, rocm]
    # Self-hosted runners must not execute untrusted fork PRs.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-instinct-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-instinct-

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace --all-targets

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  coverage:
    name: Coverage (rocm-dash crates, ratcheted)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install native build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libcap-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cov-

      # Ratcheted, fail-on-regression floor scoped to the transplanted rocm-dash
      # crates (the clean anchor) — deliberately NOT the whole workspace, so the
      # gate does not over-claim coverage of the large untyped rocm-cli core
      # Baseline measured 2026-06-11: 73.7% lines across the four
      # crates. Floor set just below measured; ratchet upward as the larger TUI
      # tab files (bench/overview/modal) gain tests.
      - name: Coverage gate (rocm-dash crates, >= 70% lines)
        run: |
          cargo llvm-cov --no-cfg-coverage \
            -p rocm-dash-core -p rocm-dash-collectors \
            -p rocm-dash-daemon -p rocm-dash-tui \
            --fail-under-lines 70

  gpu-smoke:
    name: GPU Smoke (gfx1151)
    runs-on: [self-hosted, windows-gfx1151-gpu-rocm]
    needs: [windows-build-and-test, fmt, clippy]
    # Temporarily disabled: the gfx1151 self-hosted runner isn't picking up the job / GPU smoke isn't working yet.
    # To re-enable, restore:
    # if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    if: false
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build workspace
        run: cargo build --workspace --all-targets

      - name: Host detection
        run: .\target\debug\rocm.exe doctor

      - name: Engine detection
        run: .\target\debug\rocm-engine-pytorch.exe detect

      - name: Engine capabilities
        run: .\target\debug\rocm-engine-pytorch.exe capabilities

      - name: llama.cpp adapter detection
        run: .\target\debug\rocm-engine-llama-cpp.exe detect

      - name: llama.cpp adapter capabilities
        run: .\target\debug\rocm-engine-llama-cpp.exe capabilities

      - name: ATOM adapter detection
        run: .\target\debug\rocm-engine-atom.exe detect

      - name: ATOM adapter capabilities
        run: .\target\debug\rocm-engine-atom.exe capabilities

      - name: vLLM adapter detection
        run: .\target\debug\rocm-engine-vllm.exe detect

      - name: vLLM adapter capabilities
        run: .\target\debug\rocm-engine-vllm.exe capabilities

      - name: SGLang adapter detection
        run: .\target\debug\rocm-engine-sglang.exe detect

      - name: SGLang adapter capabilities
        run: .\target\debug\rocm-engine-sglang.exe capabilities

      - name: Resolve large-model recipe
        run: .\target\debug\rocm-engine-pytorch.exe resolve-model qwen32b
