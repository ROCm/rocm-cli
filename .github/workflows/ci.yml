name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install native build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libcap-dev

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Upload Linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          if-no-files-found: error
          retention-days: 3
          path: |
            target/debug/rocm
            target/debug/rocmd
            target/debug/rocm-engine-pytorch
            target/debug/rocm-engine-llama-cpp
            target/debug/rocm-engine-lemonade
            target/debug/rocm-engine-atom
            target/debug/rocm-engine-vllm
            target/debug/rocm-engine-sglang

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Local no-fallback smoke
        run: python scripts/smoke_local.py --skip-build

      - name: Acceptance harness self-tests
        run: |
          python scripts/pytorch_therock_gpu_test.py --self-test
          python scripts/llama_cpp_therock_gpu_test.py --self-test
          python scripts/comfyui_therock_gpu_test.py --self-test
          python scripts/local_assistant_therock_gpu_test.py --self-test
          python scripts/vllm_therock_gpu_test.py --self-test
          python scripts/sglang_therock_gpu_test.py --self-test
          python scripts/atom_therock_gpu_test.py --self-test
          python scripts/wsl_preflight.py --self-test

      - name: Portable WSL build deps self-test
        run: bash scripts/setup-wsl-portable-build-deps.sh --self-test

      - name: Release readiness self-test
        run: python scripts/release_readiness.py --self-test

      - name: Acceptance install lifecycle
        run: ./scripts/acceptance-install-upgrade-tui-uninstall.sh

  windows-build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build
        shell: pwsh
        run: cargo build --workspace --all-targets

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          if-no-files-found: error
          retention-days: 3
          path: |
            target/debug/rocm.exe
            target/debug/rocmd.exe
            target/debug/rocm-engine-pytorch.exe
            target/debug/rocm-engine-llama-cpp.exe
            target/debug/rocm-engine-lemonade.exe
            target/debug/rocm-engine-atom.exe
            target/debug/rocm-engine-vllm.exe
            target/debug/rocm-engine-sglang.exe

      - name: Test
        shell: pwsh
        run: cargo test --workspace --all-targets

      - name: Local no-fallback smoke
        shell: pwsh
        run: python .\scripts\smoke_local.py --skip-build

      - name: Acceptance harness self-tests
        shell: pwsh
        run: |
          python .\scripts\pytorch_therock_gpu_test.py --self-test
          python .\scripts\llama_cpp_therock_gpu_test.py --self-test
          python .\scripts\comfyui_therock_gpu_test.py --self-test
          python .\scripts\local_assistant_therock_gpu_test.py --self-test
          python .\scripts\vllm_therock_gpu_test.py --self-test
          python .\scripts\sglang_therock_gpu_test.py --self-test
          python .\scripts\atom_therock_gpu_test.py --self-test
          python .\scripts\wsl_preflight.py --self-test

      - name: Release readiness self-test
        shell: pwsh
        run: python .\scripts\release_readiness.py --self-test

      - name: Check PowerShell installer syntax
        shell: pwsh
        run: |
          $null = [scriptblock]::Create((Get-Content .\install.ps1 -Raw))
          $null = [scriptblock]::Create((Get-Content .\scripts\package-windows-release.ps1 -Raw))

      - name: Acceptance install lifecycle
        shell: pwsh
        run: .\scripts\acceptance-install-upgrade-tui-uninstall.ps1

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  coverage:
    name: Coverage (rocm-dash crates, ratcheted)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install native build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libcap-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cov-

      # Ratcheted, fail-on-regression floor scoped to the transplanted rocm-dash
      # crates (the clean anchor) — deliberately NOT the whole workspace, so the
      # gate does not over-claim coverage of the large untyped rocm-cli core
      # Baseline measured 2026-06-11: 73.7% lines across the four
      # crates. Floor set just below measured; ratchet upward as the larger TUI
      # tab files (bench/overview/modal) gain tests.
      - name: Coverage gate (rocm-dash crates, >= 70% lines)
        run: |
          cargo llvm-cov --no-cfg-coverage \
            -p rocm-dash-core -p rocm-dash-collectors \
            -p rocm-dash-daemon -p rocm-dash-tui \
            --fail-under-lines 70

  # ---------------------------------------------------------------------------
  # Optional hardware tests on dedicated self-hosted runners.
  #
  # These do NOT build: they download the exact binaries produced by the hosted
  # build jobs above and exercise the parts hosted runners cannot (real AMD GPU,
  # real WSL). Each is opt-in via a repo/org variable and continue-on-error, so
  # an offline/busy dedicated runner never blocks a PR. Enable a fleet by setting
  # its variable to "true" once the matching runners are online:
  #   ENABLE_WIN11_GPU_CI / ENABLE_INSTINCT_CI /
  #   ENABLE_WSL_UBUNTU_CI / ENABLE_WSL_FEDORA_CI
  # ---------------------------------------------------------------------------

  win11-gpu-test:
    name: Windows gfx1151 GPU test (artifact)
    runs-on: [self-hosted, windows-gfx1151-gpu-rocm]
    needs: [windows-build-and-test]
    continue-on-error: true
    # Opt-in + fork-safety (self-hosted runners must not run untrusted fork PRs).
    if: vars.ENABLE_WIN11_GPU_CI == 'true' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Download Windows binaries
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: target/debug

      - name: Host detection
        run: .\target\debug\rocm.exe doctor

      - name: Engine detection and capabilities
        run: |
          .\target\debug\rocm-engine-pytorch.exe detect
          .\target\debug\rocm-engine-pytorch.exe capabilities
          .\target\debug\rocm-engine-llama-cpp.exe detect
          .\target\debug\rocm-engine-llama-cpp.exe capabilities

      - name: Local no-fallback smoke (prebuilt)
        run: python .\scripts\smoke_local.py --skip-build

      - name: PyTorch GPU end-to-end
        run: python .\scripts\pytorch_therock_gpu_test.py --engine .\target\debug\rocm-engine-pytorch.exe

  instinct-gpu-test:
    name: Instinct bare-metal GPU test (artifact)
    runs-on: [self-hosted, linux, instinct, rocm]
    needs: [build-and-test]
    continue-on-error: true
    if: vars.ENABLE_INSTINCT_CI == 'true' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
    timeout-minutes: 45
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6

      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: target/debug

      - name: Restore executable bits
        run: chmod +x target/debug/rocm target/debug/rocmd target/debug/rocm-engine-*

      - name: Host detection
        run: ./target/debug/rocm doctor

      - name: Local no-fallback smoke (prebuilt)
        run: python3 scripts/smoke_local.py --skip-build

      - name: PyTorch GPU end-to-end
        run: python3 scripts/pytorch_therock_gpu_test.py --engine ./target/debug/rocm-engine-pytorch
      # Expand later (once first runs are green): vLLM/SGLang/ATOM GPU harnesses.

  wsl-ubuntu-test:
    name: WSL Ubuntu GPU test (artifact)
    runs-on: [self-hosted, wsl, ubuntu]
    needs: [build-and-test]
    continue-on-error: true
    if: vars.ENABLE_WSL_UBUNTU_CI == 'true' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
    timeout-minutes: 45
    permissions:
      contents: read
      actions: read
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: target/debug

      - name: Test prebuilt binaries in WSL Ubuntu
        run: |
          $ErrorActionPreference = "Stop"
          $wp = (wsl -d Ubuntu wslpath "'$($PWD.Path)'").Trim()
          $script = @"
          set -euo pipefail
          cd '$wp'
          chmod +x target/debug/rocm target/debug/rocmd target/debug/rocm-engine-*
          python3 scripts/smoke_local.py --skip-build
          python3 scripts/pytorch_therock_gpu_test.py --engine ./target/debug/rocm-engine-pytorch
          "@
          wsl -d Ubuntu -- bash -lc $script
          if ($LASTEXITCODE -ne 0) { throw "WSL Ubuntu hardware test failed with exit code $LASTEXITCODE" }

  wsl-fedora-test:
    name: WSL Fedora GPU test (build-in-WSL, secondary)
    runs-on: [self-hosted, wsl, fedora]
    # Secondary: builds inside WSL Fedora instead of reusing the ubuntu-latest
    # artifact, to avoid cross-distro glibc mismatch. Non-blocking.
    continue-on-error: true
    if: vars.ENABLE_WSL_FEDORA_CI == 'true' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
    timeout-minutes: 60
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Build and GPU-test in WSL Fedora
        run: |
          $ErrorActionPreference = "Stop"
          $wp = (wsl -d Fedora wslpath "'$($PWD.Path)'").Trim()
          $script = @"
          set -euo pipefail
          cd '$wp'
          export CARGO_TARGET_DIR="`$HOME/.cache/rocm-cli-target"
          if ! command -v cargo >/dev/null 2>&1; then
            curl -fsSL https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
            export PATH="`$HOME/.cargo/bin:`$PATH"
          fi
          if command -v dnf >/dev/null 2>&1; then
            sudo dnf install -y pkgconf-pkg-config libcap-devel gcc gcc-c++ make
          fi
          cargo build --workspace --all-targets
          python3 scripts/smoke_local.py --skip-build --target-dir "`$CARGO_TARGET_DIR"
          python3 scripts/pytorch_therock_gpu_test.py --engine "`$CARGO_TARGET_DIR/debug/rocm-engine-pytorch"
          "@
          wsl -d Fedora -- bash -lc $script
          if ($LASTEXITCODE -ne 0) { throw "WSL Fedora hardware test failed with exit code $LASTEXITCODE" }
