# Per-scenario expected-failure (xfail) matrix, keyed by scenario @id.
#
# This file holds the irreducibly manual part of the expectation system: a known
# BUG is a defect the capability probe cannot infer, so each is declared here.
# Everything else — is the required engine available on this host? what engine
# does `serve` default to? does this platform prefer vLLM? — is DERIVED from the
# host capability probe (see src/capability.rs) and is NOT encoded here.
#
# Resolution at runtime (see tests/e2e-cucumber/src/expectation.rs):
#   1. A scenario whose @requires-gpu / @requires-engine can't be satisfied on
#      this host is SKIPPED (not-applicable) — never listed here.
#   2. Otherwise, the FIRST matching condition below marks it expected-fail
#      (xfail); a scenario that then PASSES is an XPASS (stale entry — remove it).
#   3. No matching condition → expected-pass.
#
# Condition predicate grammar (deliberately tiny):
#   [[<scenario-id>]]                 one table per condition (arrays = OR)
#   when = { effective_engine = "vllm", os = "linux", is_wsl = false }
#                                     all present keys must match (AND)
#   bug = "EAI-NNNN"                  ticket reference (shown in the report)
#   reason = "..."                    human explanation (shown in the report)
#   serve_timeout_secs = 90          optional: shorter serve wait for a known bug
#
# An empty `when = {}` means "always xfail" (platform-independent bug).

# --- EAI-7222: privacy notice is only shown in the interactive dash/TUI, so a
# black-box CLI test can't verify it. Tracked as xfail (any platform) rather than
# a silent green no-op — the step panics, which is the expected outcome here. ---
[["chat-privacy-notice-accurate"]]
when = {}
bug = "EAI-7222"
reason = "Privacy notice is TUI-only; cannot be verified by a black-box CLI test."

# --- EAI-7219: short-name expansion not surfaced in serve output (any engine) ---
[["serve-short-name-expansion"]]
when = {}
bug = "EAI-7219"
reason = "Serve output does not surface the expanded full model name for a short name."

[["serve-short-name-consistent-across-engines"]]
when = {}
bug = "EAI-7219"
reason = "Engines do not report a consistent resolved model name for a short name."

# --- EAI-7333: vLLM reports /v1/models ready but refuses inference. vLLM-only. ---
# Applies wherever the effective serve engine is vLLM. On lemonade-default hosts
# (e.g. Strix Halo gfx1151, native Windows) these resolve to expected-pass, which
# is what fixes the Strix-Windows XPASS from run #543.
[["serve-vllm-inference"]]
when = { effective_engine = "vllm" }
bug = "EAI-7333"
reason = "vLLM service reports ready (/v1/models 200) but POST /v1/chat/completions is refused."
serve_timeout_secs = 90

# Default-engine serve is RECIPE-driven, not host-driven: `rocm serve <model>`
# with no --engine resolves to the recipe's preferred model+engine. On an Instinct
# host (effective_engine=vllm) the request resolves to a GGUF recipe on lemonade,
# whose llama.cpp Vulkan backend hangs on Instinct (EAI-7052) → the endpoint never
# becomes ready. (Not EAI-7333: the default serve doesn't use vLLM at all here.)
[["serve-default-engine-working-endpoint"]]
when = { effective_engine = "vllm" }
bug = "EAI-7052"
reason = "Default serve resolves to a GGUF recipe on lemonade; its Vulkan backend hangs on Instinct, so the endpoint never reaches ready."
serve_timeout_secs = 90

# On a lemonade-native LINUX host (Strix Halo Ubuntu) the lemonade managed serve
# loads the model and reaches ready on :8001, then is shut down ~0.08s later, so
# the endpoint never becomes reachable (EAI-7423, root-caused on the box
# 2026-07-15 — NOT the earlier "backend install hides the plan line" theory, which
# was disproven: the `engine:` line IS emitted). os=linux: on native Windows this
# scenario PASSES (run 29338475133 Strix-Windows), so it must NOT be xfail'd there.
[["serve-default-engine-working-endpoint"]]
when = { effective_engine = "lemonade", os = "linux" }
bug = "EAI-7423"
reason = "Lemonade managed serve reaches ready then shuts down immediately, so the endpoint never becomes reachable."
serve_timeout_secs = 90

[["serve-default-engine-inference"]]
when = { effective_engine = "vllm" }
bug = "EAI-7052"
reason = "Default serve resolves to a GGUF recipe on lemonade; its Vulkan backend hangs on Instinct, so inference never succeeds."
serve_timeout_secs = 90

# On a lemonade-native LINUX host the served model's endpoint drops before
# inference: the lemonade managed serve reaches ready then is shut down ~0.08s
# later (EAI-7423, root-caused on the box 2026-07-15 — not a Vulkan hang).
# os=linux: passes on native Windows (run 29338475133).
[["serve-default-engine-inference"]]
when = { effective_engine = "lemonade", os = "linux" }
bug = "EAI-7423"
reason = "Lemonade managed serve reaches ready then shuts down immediately, so inference never succeeds."
serve_timeout_secs = 90

# NOTE: no vLLM xfail for serve-readiness-contract. It was xfail'd against
# EAI-7333 (CLI healthcheck reports ready off /v1/models before inference works),
# but it XPASS'd on MI300X (run 29404668327) and passes reliably by hand there:
# on Instinct vLLM (--enforce-eager) the model IS inference-ready by the time
# `services list` reports ready, so the readiness contract holds. EAI-7333 stays
# OPEN (the early-readiness code smell is real and may surface on other
# scenarios/hardware), but this scenario is expect-pass on the vLLM path.

# On a lemonade LINUX host this scenario does a real lemonade serve, which reaches
# ready then shuts down immediately (EAI-7423, see serve-lemonade-inference).
# os=linux: on native Windows lemonade serve works, so this PASSES there (verified
# run 29338475133 Strix-Windows XPASS) and must not be xfail'd.
[["serve-readiness-contract"]]
when = { effective_engine = "lemonade", os = "linux" }
bug = "EAI-7423"
reason = "Lemonade managed serve reaches ready then shuts down immediately, so the ready-to-serve contract fails."
serve_timeout_secs = 90

